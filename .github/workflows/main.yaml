name: MechanicShop API CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports
        env:
          FLASK_CONFIG: TestingConfig
        run: python -c "from flask_app import app; print('Flask app import OK')"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s app/tests -p "test_*.py" -v

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          HOOK_URL="$(printf '%s' "$RENDER_DEPLOY_HOOK_URL" | tr -d '\r\n')"
          HOOK_URL="${HOOK_URL#\"}"
          HOOK_URL="${HOOK_URL%\"}"
          HOOK_URL="${HOOK_URL#\'}"
          HOOK_URL="${HOOK_URL%\'}"

          if [ -z "$HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is empty or missing."
            exit 1
          fi

          case "$HOOK_URL" in
            https://api.render.com/deploy/*) ;;
            *)
              echo "RENDER_DEPLOY_HOOK_URL is not a valid Render deploy hook URL."
              exit 1
              ;;
          esac

          curl --fail-with-body -sS -X POST "$HOOK_URL"